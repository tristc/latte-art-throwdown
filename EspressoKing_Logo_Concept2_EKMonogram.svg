<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#F5F5F0"/>
  
  <!-- Logo Concept 2: THE EK MONOGRAM (Art Deco Style) -->
  <g transform="translate(200, 170)">
    <!-- Outer circle frame -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#1A1A1A" stroke-width="3"/>
    <circle cx="0" cy="0" r="68" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
    
    <!-- E letter (vertical left) -->
    <path d="M-30,-40 L-30,40 M-30,-40 L-5,-40 M-30,0 L-10,0 M-30,40 L-5,40" 
          stroke="#1A1A1A" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- K letter (overlapping/interlocking with E) -->
    <path d="M10,-40 L10,40 M10,0 L35,-40 M10,0 L35,40" 
          stroke="#1A1A1A" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Art Deco geometric accents -->
    <line x1="-50" y1="-20" x2="-65" y2="-35" stroke="#D4AF37" stroke-width="2"/>
    <line x1="-50" y1="20" x2="-65" y2="35" stroke="#D4AF37" stroke-width="2"/>
    <line x1="50" y1="-20" x2="65" y2="-35" stroke="#D4AF37" stroke-width="2"/>
    <line x1="50" y1="20" x2="65" y2="35" stroke="#D4AF37" stroke-width="2"/>
    
    <!-- Center dot accent -->
    <circle cx="0" cy="0" r="4" fill="#D4AF37"/>
    
    <!-- Top crown hint (small) -->
    <path d="M-8,-58 L0,-68 L8,-58 L0,-65 Z" fill="#D4AF37"/>
  </g>
  
  <!-- Brand Name -->
  <text x="200" y="280" font-family="Arial Black, sans-serif" font-size="26" 
        font-weight="900" text-anchor="middle" fill="#1A1A1A" letter-spacing="5">ESPRESSO KING</text>
  
  <!-- Tagline -->
  <text x="200" y="305" font-family="Georgia, serif" font-size="11" 
        font-style="italic" text-anchor="middle" fill="#6B6B6B" letter-spacing="2">THE MELBOURNE METHOD</text>
  
  <!-- Concept Label -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="10" 
        text-anchor="middle" fill="#D4AF37" font-weight="bold" letter-spacing="3">CONCEPT 2: EK MONOGRAM</text>
</svg>