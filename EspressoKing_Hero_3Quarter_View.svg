<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- Background -->
  <rect width="900" height="600" fill="#1A1A1A"/>
  
  <!-- Subtle gradient overlay --
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#2A2A2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <rect width="900" height="600" fill="url(#spotlight)"/>
  
  <!-- === YAMAHA NMAX + BAR SETUP (3-Quarter View) === --
  
  <!-- Ground shadow --
  <ellipse cx="450" cy="520" rx="280" ry="40" fill="#0F0F0F" opacity="0.6"/>
  
  <!-- === REAR WHEEL (Left side, further back) === --
  <circle cx="280" cy="450" r="50" fill="#111" stroke="#222" stroke-width="3"/>
  <circle cx="280" cy="450" r="30" fill="#222"/>
  <circle cx="280" cy="450" r="12" fill="#333"/>
  <!-- Spokes --
  <line x1="280" y1="400" x2="280" y2="500" stroke="#333" stroke-width="2"/>
  <line x1="230" y1="450" x2="330" y2="450" stroke="#333" stroke-width="2"/>
  
  
  <!-- === FRONT WHEEL (Right side, closer) === --
  <circle cx="620" cy="450" r="55" fill="#111" stroke="#222" stroke-width="3"/>
  <circle cx="620" cy="450" r="35" fill="#222"/>
  <circle cx="620" cy="450" r="15" fill="#444"/>
  <!-- Spokes --
  <line x1="620" y1="395" x2="620" y2="505" stroke="#333" stroke-width="2"/>
  <line x1="565" y1="450" x2="675" y2="450" stroke="#333" stroke-width="2"/>
  
  
  <!-- === MAIN BODY (Stylized 3D) === --
  <!-- Body shell (matte black) --
  <path d="M280,420 
           L320,350 
           L380,310 
           L500,300 
           L580,330 
           L620,380 
           L620,450 
           L550,470 
           L350,470 
           L280,450 Z" 
        fill="#1A1A1A" stroke="#333" stroke-width="2"/>
  
  <!-- Body highlight edges --
  <path d="M320,350 L380,310 L500,300" fill="none" stroke="#333" stroke-width="1"/>
  
  <path d="M500,300 L580,330 L620,380" fill="none" stroke="#444" stroke-width="1"/>
  
  
  <!-- Seat --
  <path d="M360,320 L480,315 L500,340 L480,360 L360,365 Z" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
  
  <!-- Seat texture lines --
  <line x1="380" y1="325" x2="380" y2="360" stroke="#333" stroke-width="1"/>
  <line x1="400" y1="322" x2="400" y2="362" stroke="#333" stroke-width="1"/
         text="Seat"/>
  <line x1="420" y1="320" x2="420" y2="363" stroke="#333" stroke-width="1"/>
  
  <line x1="440" y1="318" x2="440" y2="362" stroke="#333" stroke-width="1"/>
  
  
  <!-- Windshield --
  <path d="M560,285 L590,260 L610,290 L580,315 Z" fill="#222" opacity="0.7" stroke="#444" stroke-width="1"/>
  
  
  <!-- Handlebars --
  <path d="M590,300 L630,280 L650,290" fill="none" stroke="#666" stroke-width="5" stroke-linecap="round"/>
  
  <circle cx="650" cy="290" r="5" fill="#D4AF37"/>
  
  <!-- Headlight area --
  <rect x="575" y="340" width="35" height="25" rx="5" fill="#222" stroke="#444" stroke-width="1"/>
  
  <ellipse cx="592" cy="352" rx="10" ry="8" fill="#333"/>
  
  
  <!-- Exhaust --
  <rect x="300" y="440" width="80" height="20" rx="4" fill="#444" stroke="#555" stroke-width="1"/>
  
  
  <!-- === THE BAR SETUP (Rear rack) === --
  
  <!-- Base platform --
  <rect x="240" y="280" width="140" height="25" rx="3" fill="#1A1A1A" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Vertical frame (left) --
  <rect x="250" y="200" width="10" height="85" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1.5"/>
  
  <!-- Vertical frame (right) --
  <rect x="360" y="200" width="10" height="85" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1.5"/>
  
  
  <!-- Top shelf --
  <rect x="235" y="195" width="150" height="12" rx="2" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1.5"/>
  
  
  <!-- THERMAL DISPENSER 1 (Left - Hot Coffee) --
  <rect x="245" y="155" width="45" height="45" rx="5" fill="#2A2A2A" stroke="#555" stroke-width="2"/>
  
  <rect x="255" y="140" width="25" height="18" rx="2" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <!-- Tap handle --
  <rect x="265" y="162" width="6" height="20" fill="#D4AF37"/>
  
  <circle cx="268" cy="185" r="5" fill="#D4AF37"/>
  
  <!-- Label --
  <text x="267" y="175" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">HOT</text>
  
  
  <!-- THERMAL DISPENSER 2 (Right - Cold Brew) --
  <rect x="330" y="155" width="45" height="45" rx="5" fill="#2A2A2A" stroke="#555" stroke-width="2"/>
  
  <rect x="340" y="140" width="25" height="18" rx="2" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <!-- Tap handle --
  <rect x="350" y="162" width="6" height="20" fill="#D4AF37"/>
  
  <circle cx="353" cy="185" r="5" fill="#D4AF37"/>
  
  <!-- Label --
  <text x="352" y="175" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">COLD</text>
  
  
  <!-- Cup Dispenser (Center) --
  <rect x="300" y="165" width="22" height="35" rx="3" fill="#444" stroke="#666" stroke-width="1"/>
  
  <ellipse cx="311" cy="168" rx="9" ry="3" fill="#1A1A1A" stroke="#888" stroke-width="1"/>
  
  <ellipse cx="311" cy="175" rx="9" ry="3" fill="#1A1A1A" stroke="#888" stroke-width="1"/>
  
  <ellipse cx="311" cy="182" rx="9" ry="3" fill="#1A1A1A" stroke="#888" stroke-width="1"/>
  
  
  <!-- === FOLD-OUT TABLE (Right side) === --
  <!-- Hinge --
  <circle cx="380" cy="292" r="7" fill="#555" stroke="#666" stroke-width="1"/>
  
  <circle cx="380" cy="292" r="3" fill="#333"/>
  
  
  <!-- Table surface (brushed aluminum look) --
  <rect x="385" y="275" width="80" height="35" rx="3" fill="#777" stroke="#999" stroke-width="2"/>
  
  <!-- Brushed lines --
  <line x1="395" y1="280" x2="460" y2="280" stroke="#666" stroke-width="1"/>
  
  <line x1="395" y1="292" x2="460" y2="292" stroke="#666" stroke-width="1"/>
  
  <line x1="395" y1="305" x2="460" y2="305" stroke="#666" stroke-width="1"/>
  
  
  <!-- QR Code Holder --
  <rect x="360" y="240" width="18" height="28" rx="2" fill="#D4AF37"/>
  
  <rect x="363" y="245" width="12" height="12" fill="#FFF"/>
  
  <!-- Fake QR pattern --
  <rect x="365" y="247" width="3" height="3" fill="#1A1A1A"/>
  
  <rect x="370" y="247" width="3" height="3" fill="#1A1A1A"/>
  
  <rect x="365" y="252" width="3" height="3" fill="#1A1A1A"/>
  
  
  <!-- === UMBRELLA (Deployed behind) === --
  <!-- Pole --
  <rect x="307" y="50" width="6" height="145" fill="#555"/>
  
  <!-- Canopy (charcoal) --
  <path d="M180,150 Q310,50 310,50 Q310,50 440,150 L400,160 Q310,130 220,160 Z" fill="#3A3A3A" stroke="#555" stroke-width="2"/>
  
  <!-- Umbrella ribs --
  <line x1="310" y1="50" x2="220" y2="160" stroke="#444" stroke-width="1.5"/>
  
  <line x1="310" y1="50" x2="265" y2="135" stroke="#444" stroke-width="1.5"/>
  
  <line x1="310" y1="50" x2="355" y2="135" stroke="#444" stroke-width="1.5"/>
  
  <line x1="310" y1="50" x2="400" y2="160" stroke="#444" stroke-width="1.5"/>
  
  
  <!-- EK Logo on umbrella --
  <circle cx="310" cy="100" r="18" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <text x="310" y="105" font-family="Arial Black" font-size="12" fill="#D4AF37" text-anchor="middle">EK</text>
  
  
  <!-- === BRANDING PLATE === --
  <rect x="295" y="255" width="30" height="18" rx="2" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <text x="310" y="267" font-family="Arial Black" font-size="8" fill="#D4AF37" text-anchor="middle">EK</text>
  
  
  <!-- === LABELS / ANNOTATIONS === --
  
  <!-- Label 1: Yamaha NMax --
  <line x1="480" y1="400" x2="580" y2="450" stroke="#D4AF37" stroke-width="1"/>
  <rect x="570" y="440" width="120" height="35" rx="3" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <text x="630" y="460" font-family="Arial" font-size="10" fill="#D4AF37" text-anchor="middle" font-weight="bold"
>YAMAHA NMAX 155</text>
  
  <text x="630" y="470" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">Premium Scooter Base</text>
  
  
  <!-- Label 2: Thermal Dispensers --
  <line x1="267" y1="155" x2="180" y2="120" stroke="#D4AF37" stroke-width="1"/>
  
  <rect x="100" y="100" width="150" height="35" rx="3" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <text x="175" y="120" font-family="Arial" font-size="10" fill="#D4AF37" text-anchor="middle" font-weight="bold">10L THERMAL DISPENSERS</text>
  
  <text x="175" y="130" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">Hot Coffee + Cold Brew</text>
  
  
  <!-- Label 3: Fold-Out Table --
  <line x1="425" y1="292" x2="520" y2="300" stroke="#D4AF37" stroke-width="1"/>
  
  <rect x="500" y="280" width="130" height="35" rx="3" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <text x="565" y="300" font-family="Arial" font-size="10" fill="#D4AF37" text-anchor="middle" font-weight="bold">FOLD-OUT TABLE</text>
  
  <text x="565" y="310" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">40×30cm Work Surface</text>
  
  
  <!-- Label 4: Branded Umbrella --
  <line x1="380" y1="120" x2="480" y2="100" stroke="#D4AF37" stroke-width="1"/>
  
  <rect x="460" y="70" width="120" height="35" rx="3" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <text x="520" y="90" font-family="Arial" font-size="10" fill="#D4AF37" text-anchor="middle" font-weight="bold">BRANDED UMBRELLA</text>
  
  <text x="520" y="100" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">2m UV Protection</text>
  
  
  <!-- === TITLE BLOCK === --
  <!-- Main title --
  <text x="450" y="60" font-family="Arial Black, sans-serif" font-size="28" 
        fill="#D4AF37" text-anchor="middle" letter-spacing="4"
        style="text-transform: uppercase;"
>ESPRESSO KING</text>
  
  <!-- Subtitle --
  <text x="450" y="85" font-family="Arial" font-size="14" 
        fill="#888" text-anchor="middle" letter-spacing="3">The Melbourne Method — Mobile Bar Setup</text>
  
  
  <!-- === SPEC BOX === --
  <rect x="50" y="480" width="200" height="100" rx="5" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <text x="150" y="505" font-family="Arial Black" font-size="11" fill="#D4AF37" text-anchor="middle">SPECIFICATIONS</text>
  
  <text x="65" y="525" font-family="Arial" font-size="9" fill="#888">Base Vehicle:</text>
  
  <text x="190" y="525" font-family="Arial" font-size="9" fill="#FFF" text-anchor="end">Yamaha NMax 155</text>
  
  <text x="65" y="542" font-family="Arial" font-size="9" fill="#888">Capacity:</text>
  
  <text x="190" y="542" font-family="Arial" font-size="9" fill="#FFF" text-anchor="end">20L Coffee (200 cups)</text>
  
  <text x="65" y="559" font-family="Arial" font-size="9" fill="#888">Setup Time:</text>
  
  <text x="190" y="559" font-family="Arial" font-size="9" fill="#FFF" text-anchor="end">60 Seconds</text>
  
  <text x="65" y="560" font-family="Arial" font-size="9" fill="#888">Investment:</text>
  
  <text x="190" y="565" font-family="Arial" font-size="9" fill="#D4AF37" text-anchor="end" font-weight="bold">RM 21,890</text>
  
</svg>