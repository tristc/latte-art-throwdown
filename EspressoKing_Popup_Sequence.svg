<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial Black, sans-serif" font-size="24" 
        fill="#D4AF37" text-anchor="middle" letter-spacing="3">THE POP-UP SEQUENCE</text>
  
  <!-- === STEP 1: ARRIVE === -->
  <g transform="translate(100, 280)">
    <!-- Ground -->
    <rect x="-80" y="80" width="160" height="3" fill="#444"/>
    
    <!-- Bike side view (simplified) -->
    <!-- Wheels -->
    <circle cx="-50" cy="60" r="35" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="50" cy="60" r="35" fill="none" stroke="#333" stroke-width="6"/>
    <!-- Body -->
    <path d="M-50,40 L-30,20 L30,20 L50,40 L50,60 L-50,60 Z" fill="#1A1A1A" stroke="#333" stroke-width="2"/>
    
    <!-- Seat -->
    <rect x="-20" y="15" width="40" height="10" rx="3" fill="#3A3A3A"/>
    
    <!-- Handlebars -->
    <line x1="45" y1="25" x2="60" y2="15" stroke="#666" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Folded rack (compact) -->
    <rect x="-70" y="5" width="50" height="25" rx="3" fill="#2A2A2A" stroke="#D4AF37" stroke-width="1"/>
    
    <!-- Folded umbrella -->
    <rect x="-45" y="-35" width="4" height="40" fill="#3A3A3A"/>
    <path d="M-55,-35 L-35,-35 L-45,-50 Z" fill="#3A3A3A"/>
    
    <!-- Step label -->
    <text x="0" y="120" font-family="Arial Black" font-size="14" fill="#D4AF37" text-anchor="middle">01</text>
    <text x="0" y="140" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">ARRIVE</text>
    <text x="0" y="155" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Park anywhere</text>
  </g>
  
  <!-- === STEP 2: UNFOLD === -->
  <g transform="translate(300, 280)">
    <!-- Ground -->
    <rect x="-80" y="80" width="160" height="3" fill="#444"/>
    
    <!-- Bike -->
    <circle cx="-50" cy="60" r="35" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="50" cy="60" r="35" fill="none" stroke="#333" stroke-width="6"/>
    <path d="M-50,40 L-30,20 L30,20 L50,40 L50,60 L-50,60 Z" fill="#1A1A1A" stroke="#333" stroke-width="2"/>
    
    <rect x="-20" y="15" width="40" height="10" rx="3" fill="#3A3A3A"/>
    
    <line x1="45" y1="25" x2="60" y2="15" stroke="#666" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Unfolding rack (animated position) -->
    <rect x="-75" y="-10" width="60" height="15" rx="2" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1.5"/>
    
    <!-- Vertical supports (rising) -->
    <rect x="-70" y="-45" width="5" height="40" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
    <rect x="-20" y="-45" width="5" height="40" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
    
    
    <!-- Dispensers (appearing) -->
    <rect x="-68" y="-55" width="20" height="25" rx="3" fill="#2A2A2A" stroke="#555" stroke-width="1"/>
    
    <rect x="-35" y="-55" width="20" height="25" rx="3" fill="#2A2A2A" stroke="#555" stroke-width="1"/>
    
    
    <!-- Table (folding out) -->
    <rect x="-10" y="5" width="50" height="20" rx="2" fill="#888" stroke="#AAA" stroke-width="1"/>
    
    <!-- Dotted motion lines -->
    <line x1="-90" y1="-30" x2="-100" y2="-40" stroke="#D4AF37" stroke-width="1" stroke-dasharray="3,3"/>
    
    <line x1="-90" y1="-20" x2="-105" y2="-25" stroke="#D4AF37" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Step label -->
    <text x="0" y="120" font-family="Arial Black" font-size="14" fill="#D4AF37" text-anchor="middle">02</text>
    
    <text x="0" y="140" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">UNFOLD</text>
    
    <text x="0" y="155" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Rack extends</text>
  </g>
  
  <!-- === STEP 3: SERVE === -->
  <g transform="translate(500, 280)">
    <!-- Ground -->
    <rect x="-80" y="80" width="160" height="3" fill="#444"/>
    
    <!-- Bike -->
    <circle cx="-50" cy="60" r="35" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="50" cy="60" r="35" fill="none" stroke="#333" stroke-width="6"/>
    
    <path d="M-50,40 L-30,20 L30,20 L50,40 L50,60 L-50,60 Z" fill="#1A1A1A" stroke="#333" stroke-width="2"/>
    
    <rect x="-20" y="15" width="40" height="10" rx="3" fill="#3A3A3A"/>
    
    <line x1="45" y1="25" x2="60" y2="15" stroke="#666" stroke-width="4" stroke-linecap="round"/>
    
    
    <!-- Full rack system -->
    <rect x="-80" y="-15" width="70" height="12" rx="2" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1.5"/>
    
    <!-- Vertical supports -->
    <rect x="-75" y="-55" width="6" height="45" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
    
    <rect x="-25" y="-55" width="6" height="45" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
    
    
    <!-- Top shelf -->
    <rect x="-82" y="-60" width="74" height="8" rx="2" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
    
    
    <!-- Dispensers (full) -->
    <rect x="-78" y="-85" width="22" height="28" rx="3" fill="#2A2A2A" stroke="#555" stroke-width="1.5"/>
    
    <rect x="-48" y="-85" width="22" height="28" rx="3" fill="#2A2A2A" stroke="#555" stroke-width="1.5"/>
    
    <rect x="-35" y="-95" width="16" height="20" rx="2" fill="#444" stroke="#666" stroke-width="1"/>
    
    
    <!-- Gold taps -->
    <rect x="-72" y="-65" width="6" height="12" fill="#D4AF37"/>
    
    <rect x="-42" y="-65" width="6" height="12" fill="#D4AF37"/>
    
    
    <!-- Folded-out table -->
    <rect x="-5" y="-5" width="60" height="25" rx="3" fill="#888" stroke="#AAA" stroke-width="2"/>
    
    <!-- Cup on table -->
    <rect x="15" y="-15" width="12" height="18" rx="2" fill="#F5F5F0" stroke="#CCC" stroke-width="1"/>
    
    <ellipse cx="21" cy="-15" rx="6" ry="2" fill="#D4AF37" opacity="0.8"/>
    
    
    <!-- Umbrella (deployed) -->
    <rect x="-43" y="-145" width="3" height="85" fill="#666"/>
    
    <path d="M-75,-85 Q-43,-115 -43,-145 Q-43,-115 -11,-85 L-20,-80 Q-43,-100 -66,-80 Z" fill="#3A3A3A" stroke="#555" stroke-width="1"/>
    
    <!-- EK on umbrella -->
    <text x="-43" y="-105" font-family="Arial Black" font-size="8" fill="#D4AF37" text-anchor="middle">EK</text>
    
    
    <!-- QR code holder -->
    <rect x="5" y="-45" width="12" height="18" rx="2" fill="#D4AF37"/>
    
    <rect x="7" y="-41" width="8" height="8" fill="#FFF"/>
    
    <!-- Steam rising -->
    <path d="M20,-35 Q25,-45 20,-55" stroke="#888" stroke-width="2" fill="none" opacity="0.6"/>
    
    <path d="M30,-30 Q35,-40 30,-50" stroke="#888" stroke-width="2" fill="none" opacity="0.6"/>
    
    
    <!-- Step label -->
    <text x="0" y="120" font-family="Arial Black" font-size="14" fill="#D4AF37" text-anchor="middle">03</text>
    
    <text x="0" y="140" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">SERVE</text>
    
    <text x="0" y="155" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Ready in 60s</text>
  </g>
  
  <!-- === STEP 4: PACK UP === -->
  <g transform="translate(700, 280)">
    <!-- Ground -->
    <rect x="-80" y="80" width="160" height="3" fill="#444"/>
    
    <!-- Bike (folding back) -->
    <circle cx="-50" cy="60" r="35" fill="none" stroke="#333" stroke-width="6"/>
    
    <circle cx="50" cy="60" r="35" fill="none" stroke="#333" stroke-width="6"/>
    
    <path d="M-50,40 L-30,20 L30,20 L50,40 L50,60 L-50,60 Z" fill="#1A1A1A" stroke="#333" stroke-width="2"/>
    
    <rect x="-20" y="15" width="40" height="10" rx="3" fill="#3A3A3A"/>
    
    <line x1="45" y1="25" x2="60" y2="15" stroke="#666" stroke-width="4" stroke-linecap="round"/>
    
    
    <!-- Folding back (compact) -->
    <rect x="-70" y="5" width="50" height="25" rx="3" fill="#2A2A2A" stroke="#D4AF37" stroke-width="1"/>
    
    <!-- Folded umbrella -->
    <rect x="-45" y="-35" width="4" height="40" fill="#3A3A3A"/>
    
    <path d="M-55,-35 L-35,-35 L-45,-50 Z" fill="#3A3A3A"/>
    
    
    <!-- Motion arrows (reverse) -->
    <polygon points="-20,-60 -30,-65 -30,-55" fill="#D4AF37"/>
    
    <line x1="-30" y1="-60" x2="-50" y2="-60" stroke="#D4AF37" stroke-width="2"/>
    
    <!-- Clock icon (quick) -->
    <circle cx="20" cy="-30" r="15" fill="none" stroke="#D4AF37" stroke-width="2"/>
    
    <line x1="20" y1="-30" x2="20" y2="-40" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
    
    <line x1="20" y1="-30" x2="28" y2="-25" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
    
    
    <!-- Step label -->
    <text x="0" y="120" font-family="Arial Black" font-size="14" fill="#D4AF37" text-anchor="middle">04</text>
    
    <text x="0" y="140" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">PACK UP</text>
    
    <text x="0" y="155" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">60s to go</text>
  </g>
  
  <!-- Arrows between steps --
  <line x1="180" y1="340" x2="220" y2="340" stroke="#D4AF37" stroke-width="2" stroke-dasharray="5,3"/>
  
  <polygon points="220,335 230,340 220,345" fill="#D4AF37"/>
  
  
  <line x1="380" y1="340" x2="420" y2="340" stroke="#D4AF37" stroke-width="2" stroke-dasharray="5,3"/>
  
  <polygon points="420,335 430,340 420,345" fill="#D4AF37"/>
  
  
  <line x1="580" y1="340" x2="620" y2="340" stroke="#D4AF37" stroke-width="2" stroke-dasharray="5,3"/>
  
  <polygon points="620,335 630,340 620,345" fill="#D4AF37"/>
  
  
  <!-- Bottom stats -->
  <rect x="250" y="420" width="300" height="60" rx="5" fill="#1A1A1A" stroke="#D4AF37" stroke-width="1"/>
  
  <text x="400" y="445" font-family="Arial Black" font-size="14" fill="#D4AF37" text-anchor="middle">TOTAL SETUP TIME: 60 SECONDS</text>
  
  <text x="400" y="465" font-family="Arial" font-size="11" fill="#888" text-anchor="middle">Park → Unfold → Serve → Pack → Move</text>
</svg>