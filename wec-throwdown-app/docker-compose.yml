version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: wec
      POSTGRES_PASSWORD: wec_secret_password
      POSTGRES_DB: wec_throwdown
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wec"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://wec:wec_secret_password@db:5432/wec_throwdown
      JWT_SECRET: change_this_to_a_random_string_in_production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/database/migrations:/app/database/migrations:ro

volumes:
  postgres_data:
