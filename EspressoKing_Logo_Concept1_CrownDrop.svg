<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Espresso Black -->
    <color id="espresso" value="#1A1A1A"/>
    <!-- Gold Brass -->
    <color id="gold" value="#D4AF37"/>
    <!-- Steam Grey -->
    <color id="grey" value="#6B6B6B"/>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#F5F5F0"/>
  
  <!-- Logo Concept 1: THE CROWN DROP -->
  <g transform="translate(200, 180)">
    <!-- Crown formed by espresso droplet -->
    <path d="M0,-80 
             C-15,-75 -25,-60 -25,-40 
             C-25,-15 -10,0 0,20 
             C10,0 25,-15 25,-40 
             C25,-60 15,-75 0,-80 Z" 
          fill="#1A1A1A"/>
    
    <!-- Crown points -->
    <path d="M-25,-45 L-35,-65 L-15,-50 Z" fill="#1A1A1A"/>
    <path d="M25,-45 L35,-65 L15,-50 Z" fill="#1A1A1A"/>
    <path d="M0,-55 L0,-75 L-8,-58 Z" fill="#1A1A1A"/>
    <path d="M0,-55 L0,-75 L8,-58 Z" fill="#1A1A1A"/>
    
    <!-- Gold accent line (the "crema") -->
    <ellipse cx="0" cy="-35" rx="20" ry="8" fill="#D4AF37" opacity="0.9"/>
    
    <!-- Inner highlight -->
    <ellipse cx="-8" cy="-50" rx="6" ry="10" fill="#6B6B6B" opacity="0.3"/>
  </g>
  
  <!-- Brand Name -->
  <text x="200" y="260" font-family="Arial Black, sans-serif" font-size="28" 
        font-weight="900" text-anchor="middle" fill="#1A1A1A" letter-spacing="4">ESPRESSO KING</text>
  
  <!-- Tagline -->
  <text x="200" y="285" font-family="Georgia, serif" font-size="11" 
        font-style="italic" text-anchor="middle" fill="#6B6B6B" letter-spacing="2">THE MELBOURNE METHOD</text>
  
  <!-- Concept Label -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="10" 
        text-anchor="middle" fill="#D4AF37" font-weight="bold" letter-spacing="3">CONCEPT 1: THE CROWN DROP</text>
</svg>